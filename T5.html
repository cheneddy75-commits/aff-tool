<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蝦皮社群推廣券 - 自動轉換連結</title>
    <style>
        :root {
            --shopee-orange: #f64d2d;
            --bg-color: #f4f7f9;
            --text-dark: #333333;
            --text-muted: #888888;
            --warning-bg: #fffbeb;
            --warning-border: #fef3c7;
            --warning-text: #b45309;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        /* 手機端卡片容器 */
        .phone-container {
            max-width: 450px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            margin-bottom: 40px;
        }

        /* 橘色頂欄 */
        .header {
            background: linear-gradient(135deg, #ff6933, var(--shopee-orange));
            color: white;
            padding: 20px 16px;
            text-align: center;
        }
        .header h1 {
            font-size: 20px;
            margin: 0 0 6px 0;
            font-weight: bold;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
        .header p {
            font-size: 13px;
            margin: 0;
            opacity: 0.9;
        }

        /* 內容區塊 */
        .content {
            padding: 20px 16px;
        }

        /* 貼上網址標題列 */
        .input-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 15px;
            font-weight: bold;
            color: var(--text-dark);
        }
        
        /* 整合後的貼上功能按鈕 */
        .title-badge-btn {
            border: 1px solid #d1d5db;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            background: #fff;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: #4b5563;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .title-badge-btn:hover {
            background-color: #f3f4f6;
            border-color: #9ca3af;
        }

        /* 輸入框與輸出框 */
        textarea {
            width: 100%;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            background-color: #f9fafb;
            padding: 14px;
            font-size: 14px;
            color: var(--text-dark);
            resize: none;
            box-sizing: border-box;
            outline: none;
            transition: border 0.2s;
        }
        textarea:focus {
            border-color: #ff8f66;
        }
        #productUrl {
            height: 75px;
        }
        #resultUrl {
            height: 90px;
            background-color: #fafafa;
        }

        /* 新增的獨立轉換按鈕樣式 */
        .btn-transform {
            width: 100%;
            background-color: #f3f4f6;
            color: #4b5563;
            border: 1px solid #d1d5db;
            border-radius: 14px;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }
        .btn-transform.active {
            background-color: #fff7ed;
            color: #ea580c;
            border-color: #fdba74;
        }

        /* 轉換結果標題列 */
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        
        .shopping-cart-tip {
            background-color: #fff1f2;
            color: #f43f5e;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
            max-width: 100%;
            box-sizing: border-box;
        }

        /* 按鈕區塊 */
        .action-group {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            margin-bottom: 24px;
        }
        .btn-main {
            flex: 1;
            background-color: #fecdd3;
            color: #f43f5e;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }
        .btn-main.active {
            background: linear-gradient(135deg, #ff6933, var(--shopee-orange));
            color: white;
        }
        .btn-icon {
            width: 50px;
            background-color: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s;
        }
        .btn-icon:hover { background-color: #f9fafb; }

        /* 警告注意區塊 */
        .warning-box {
            background-color: var(--warning-bg);
            border: 1px solid var(--warning-border);
            border-radius: 16px;
            padding: 16px;
            color: var(--warning-text);
            font-size: 13px;
            line-height: 1.6;
        }
        .warning-title {
            font-size: 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
            color: #9a3412;
        }
        .sub-title-orange {
            font-weight: bold;
            color: #ea580c;
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .step-list {
            margin: 4px 0 0 0;
            padding-left: 0;
            list-style: none;
        }
        .step-item {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            margin-bottom: 4px;
        }
        .step-num {
            background-color: #fef08a;
            color: #854d0e;
            border-radius: 4px;
            padding: 0 5px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 2px;
        }

        /* 頁尾版權 */
        .footer {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 16px;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <!-- 頂欄 -->
    <div class="header">
        <h1>🛍️ 蝦皮社群推廣券</h1>
        <p>自動轉換連結</p>
    </div>

    <!-- 內容區 -->
    <div class="content">
        <!-- 貼上網址區 -->
        <div class="input-header">
            <div class="section-title">
                <!-- 1. 功能整合：把貼上功能做進去這個按鈕 -->
                <button class="title-badge-btn" onclick="pasteFromClipboard()">📋 貼上網址</button>
            </div>
        </div>
        <textarea id="productUrl" placeholder="https://tw.shp.ee/... 或 https://shopee.tw/..." oninput="checkInput()"></textarea>
        
        <!-- 2. 新增：貼網址地方下面的獨立轉換連結按鈕 -->
        <button id="transformBtn" class="btn-transform" onclick="generateLink()">✨ 轉換連結</button>

        <!-- 轉換結果區 -->
        <div class="result-header">
            <div class="section-title" style="margin: 0;">轉換結果</div>
            <div class="shopping-cart-tip">🛒 記得先刪除購物車內要用推廣券的商品</div>
        </div>
        <textarea id="resultUrl" readonly placeholder="等待輸入有效網址..."></textarea>

        <!-- 操作按鈕 -->
        <div class="action-group">
            <button id="submitBtn" class="btn-main" onclick="goToPurchase()">
                <span>↗️ 前往購買</span>
            </button>
            <button class="btn-icon" onclick="copyToClipboard()" title="複製連結">
                📋
            </button>
        </div>

        <!-- 下方黃色注意區塊 -->
        <div class="warning-box">
            <div class="warning-title">📝 點擊連結前注意</div>
            <div>記得先刪除購物車內要用推廣券的商品，再用這個新連結重新加進去結帳，這樣才能順利幫大家買到最優惠的價格喔！</div>
            
            <div class="sub-title-orange">🔄 同商品下第二筆(含)以上</div>
            <div style="margin-bottom: 2px;">每下完一筆請務必：</div>
            <ul class="step-list">
                <li class="step-item"><span class="step-num">1</span> <span>把蝦皮 APP 完整關閉</span></li>
                <li class="step-item"><span class="step-num">2</span> <span>重新點擊連結下單</span></li>
            </ul>
        </div>

        <div class="footer">
            本工具會自動轉換綠綠的推廣連結
        </div>
    </div>
</div>

<script>
    // 寫死您的專屬聯盟 ID
    const MY_AFFILIATE_ID = "16375640010";

    // 監聽輸入狀態，改變按鈕顏色狀態
    function checkInput() {
        const url = document.getElementById('productUrl').value.trim();
        const transformBtn = document.getElementById('transformBtn');
        if (url) {
            transformBtn.classList.add('active');
        } else {
            transformBtn.classList.remove('active');
        }
    }

    // 整合功能：點選「📋 貼上網址」直接讀取剪貼簿並填入
    function pasteFromClipboard() {
        navigator.clipboard.readText()
            .then(text => {
                document.getElementById('productUrl').value = text.trim();
                checkInput();
            })
            .catch(err => {
                alert('無法自動讀取剪貼簿，請長按輸入框手動貼上。');
            });
    }

    // 核心轉換邏輯
    function generateLink() {
        let productUrl = document.getElementById('productUrl').value.trim();
        const resultTextArea = document.getElementById('resultUrl');
        const submitBtn = document.getElementById('submitBtn');

        if (!productUrl) {
            alert('請貼上蝦皮產品網址！');
            return;
        }

        // 判斷與攔截非蝦皮網址
        const isShopee = /shopee\.tw|tw\.shp\.ee/i.test(productUrl);
        if (!isShopee) {
            alert('❌ 錯誤：這不是有效的蝦皮網址，無法進行轉換！');
            resultTextArea.value = "轉換失敗：請輸入正確的蝦皮網址。";
            submitBtn.classList.remove('active');
            return;
        }

        // 判斷是否為短網址
        const isShortUrl = productUrl.includes('tw.shp.ee') || productUrl.includes('s.shopee.tw');

        if (!isShortUrl && productUrl.includes('?')) {
            // 長網址才進行參數清洗
            const parts = productUrl.split('?');
            const baseUrl = parts[0];
            const params = new URLSearchParams(parts[1]);
            const extraParams = params.get('extraParams');
            
            if (extraParams) {
                productUrl = `${baseUrl}?extraParams=${extraParams}`;
            } else {
                productUrl = baseUrl;
            }
        }

        // 安全 URL 編碼
        const encodedUrl = encodeURIComponent(productUrl);
        
        // 拼接蝦皮標準中轉格式
        const baseUrl = "https://s.shopee.tw/an_redir?origin_link=";
        const tailParams = `&affiliate_id=${MY_AFFILIATE_ID}&sub_id={clickid}`;
        
        const finalLink = baseUrl + encodedUrl + tailParams;
        resultTextArea.value = finalLink;
        
        // 激活下方「前往購買」按鈕顏色
        submitBtn.classList.add('active');

        // 自動複製到剪貼簿提示
        navigator.clipboard.writeText(finalLink);
    }

    // 前往購買按鈕點擊事件
    function goToPurchase() {
        const finalLink = document.getElementById('resultUrl').value.trim();
        if (!finalLink || finalLink.startsWith('等待輸入') || finalLink.startsWith('轉換失敗')) {
            alert('請先點擊「✨ 轉換連結」！');
            return;
        }
        // 再次確保複製，並開啟新視窗跳轉
        navigator.clipboard.writeText(finalLink).then(() => {
            window.open(finalLink, '_blank');
        });
    }

    // 獨立複製按鈕
    function copyToClipboard() {
        const resultTextArea = document.getElementById('resultUrl');
        if (!resultTextArea.value || resultTextArea.value.startsWith('等待輸入') || resultTextArea.value.startsWith('轉換失敗')) {
            alert('請先貼上正確網址並產生轉換結果！');
            return;
        }
        navigator.clipboard.writeText(resultTextArea.value)
            .then(() => alert('連結已成功複製！'))
            .catch(err => alert('複製失敗，請手動複製'));
    }
</script>

</body>
</html>
